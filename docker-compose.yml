services:
  db:
    image: mysql:8.0
    container_name: pqc_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_aqui
      MYSQL_DATABASE: pqc_benchmark_dw
    ports:
      - "3306:3306"
    volumes:
      - pqc_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password_aqui"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Serviço do dashboard (descomente para rodar tudo via Docker)
